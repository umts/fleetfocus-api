name: pull_request
permissions:
  contents: read
on:
  pull_request:
jobs:
  integrate-docker:
    name: integrate
    uses: umts/.github/.github/workflows/integrate-docker.yml@f2ad69723ec40ab538ddf48923bc211f3e2f03b1
    with:
      build_args: --build-arg RUBY_VERSION="$(cat .ruby-version)"
  integrate-ruby:
    name: integrate
    uses: umts/.github/.github/workflows/integrate-ruby.yml@f2ad69723ec40ab538ddf48923bc211f3e2f03b1
    with:
      rspec_setup_command: bin/rake db:prepare
